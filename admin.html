<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="theme-color" content="#163d3b" />
    <title>TASUKI 管理画面</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
    <script src="admin.js" defer></script>
  </head>
  <body>
    <div class="admin-shell">
      <header class="admin-header">
        <a class="admin-brand" href="index.html">
          <span class="admin-mark" aria-hidden="true"><i></i><i></i></span>
          <span><small>NPO法人</small><strong>TASUKI</strong></span>
        </a>
        <a class="back-link" href="index.html">ホームページを見る →</a>
      </header>

      <main>
        <section class="login-card" id="login-view">
          <p class="eyebrow">ADMIN LOGIN</p>
          <h1>管理画面</h1>
          <p>お知らせ、活動写真、PDF資料を管理できます。</p>
          <form id="login-form">
            <label for="password">ログインパスワード</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
            <button type="submit">ログイン</button>
            <p class="form-message" id="login-message" role="status"></p>
          </form>
        </section>

        <section class="dashboard" id="dashboard" hidden>
          <div class="dashboard-heading">
            <div>
              <p class="eyebrow">CONTENT MANAGEMENT</p>
              <h1>お知らせ管理</h1>
              <p>公開状態の変更、写真・PDF資料の掲載ができます。</p>
            </div>
            <div class="dashboard-actions">
              <button class="secondary-button" id="new-post" type="button">＋ 新規作成</button>
              <button class="text-button" id="logout" type="button">ログアウト</button>
            </div>
          </div>

          <div class="dashboard-layout">
            <aside class="post-list-panel">
              <div class="panel-heading">
                <h2>登録済みのお知らせ</h2>
                <span id="post-count">0件</span>
              </div>
              <div class="post-list" id="post-list"></div>
            </aside>

            <section class="editor-panel">
              <div class="panel-heading">
                <h2 id="editor-title">新しいお知らせ</h2>
                <span class="save-state" id="save-state" role="status"></span>
              </div>

              <form id="post-form">
                <input id="post-id" type="hidden" />

                <div class="field-row">
                  <div class="field">
                    <label for="post-title">タイトル <em>必須</em></label>
                    <input id="post-title" type="text" maxlength="120" required />
                  </div>
                  <div class="field date-field">
                    <label for="post-date">掲載日 <em>必須</em></label>
                    <input id="post-date" type="date" required />
                  </div>
                </div>

                <div class="field">
                  <label for="post-summary">短い説明</label>
                  <textarea
                    id="post-summary"
                    rows="2"
                    maxlength="300"
                    placeholder="一覧に表示する短い説明です"
                  ></textarea>
                </div>

                <div class="field">
                  <label for="post-body">本文</label>
                  <textarea
                    id="post-body"
                    rows="8"
                    maxlength="10000"
                    placeholder="活動内容やご案内を入力してください"
                  ></textarea>
                </div>

                <fieldset class="upload-fieldset">
                  <legend>活動写真</legend>
                  <p>JPEG・PNG・WebP・GIF、1ファイル25MBまで。最大8枚掲載できます。</p>
                  <label class="upload-button" for="post-images">写真を選ぶ</label>
                  <input
                    id="post-images"
                    type="file"
                    accept="image/jpeg,image/png,image/webp,image/gif"
                    multiple
                  />
                  <div class="media-list image-list" id="image-list"></div>
                </fieldset>

                <fieldset class="upload-fieldset">
                  <legend>PDF資料</legend>
                  <p>総会資料や活動案内など、PDFを1件添付できます。</p>
                  <label class="upload-button" for="post-pdf">PDFを選ぶ</label>
                  <input id="post-pdf" type="file" accept="application/pdf" />
                  <div class="media-list" id="pdf-list"></div>
                </fieldset>

                <label class="publish-toggle">
                  <input id="post-published" type="checkbox" />
                  <span aria-hidden="true"></span>
                  <strong>ホームページに公開する</strong>
                  <small>オフにすると下書きとして保存されます</small>
                </label>

                <div class="editor-actions">
                  <button class="danger-button" id="delete-post" type="button" hidden>
                    このお知らせを削除
                  </button>
                  <button class="primary-button" type="submit">保存する</button>
                </div>
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
